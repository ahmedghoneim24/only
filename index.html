<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صيانة مجدولة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* الأساسيات والخط */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #4A0404; /* الخلفية العنابية */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            -webkit-font-smoothing: antialiased; 
            overflow: hidden; 
        }

        .main-container {
            padding: 30px;
            width: 90%;
            max-width: 400px;
            /* منظور ثلاثي الأبعاد لزيادة واقعية التأثير */
            perspective: 1000px;
        }

        /* تنسيق العناصر مع تأثير فتح قفل الآيفون (من الخارج للداخل) */
        .animate-item {
            opacity: 0;
            /* تبدأ العناصر بحجم أكبر لتأتي من الخارج */
            transform: scale(1.3);
            /* استخدام منحنى سرعة ناعم يحاكي استقرار حركة iOS */
            animation: iosUnlockEnter 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        /* تأخير بسيط متدرج لظهور العناصر بنعومة وراء بعضها */
        h1.animate-item { animation-delay: 0.1s; }
        p.animate-item { animation-delay: 0.2s; }
        .spinner-container.animate-item { animation-delay: 0.3s; }

        /* العنوان */
        h1 {
            font-size: 32px; 
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
        }

        /* النص التوضيحي */
        p {
            font-size: 13px; 
            font-weight: 400;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8); 
            margin-bottom: 40px; 
        }

        /* --- مؤشر التحميل الدقيق المطابق لـ iOS --- */
        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ios-spinner {
            display: inline-block;
            position: relative;
            width: 36px;
            height: 36px;
        }

        .ios-spinner div {
            transform-origin: 18px 18px; /* الدوران حول مركز الحاوية */
            animation: iosSpinnerFade 1.2s linear infinite;
        }

        .ios-spinner div:after {
            content: " ";
            display: block;
            position: absolute;
            top: 0px;
            left: 16.5px;
            width: 3px; /* سمك الخط */
            height: 9px; /* طول الخط */
            border-radius: 5px; /* أطراف دائرية للخطوط */
            background: #D4AF37; /* اللون الذهبي */
        }

        /* توزيع الـ 12 خط بدائرة مع ضبط أوقات الظهور (Fade) */
        .ios-spinner div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .ios-spinner div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .ios-spinner div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .ios-spinner div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .ios-spinner div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .ios-spinner div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .ios-spinner div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .ios-spinner div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .ios-spinner div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .ios-spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .ios-spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .ios-spinner div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }

        /* --- تعريف الحركات (Animations) --- */

        /* 1. حركة دخول المحتوى (تأثير فتح قفل الآيفون) */
        @keyframes iosUnlockEnter {
            0% {
                opacity: 0;
                transform: scale(1.3);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 2. حركة تلاشي الألوان الخاصة بالـ Spinner في iOS */
        @keyframes iosSpinnerFade {
            0% { opacity: 1; }
            100% { opacity: 0.15; }
        }

        /* تكييف الأحجام للشاشات الصغيرة */
        @media (max-width: 350px) {
            h1 { font-size: 28px; }
            p { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="animate-item">صيانة مؤقتة</h1>
        <p class="animate-item">يوجد بعض التحسينات للموقع الخاص بـ أَحمد غنيم.<br>سيتم العودة قريباً.</p>

        <div class="spinner-container animate-item">
            <div class="ios-spinner">
                <div></div><div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>
    </div>

</body>
</html>
