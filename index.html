<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Ghoneim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            font-family: 'Cairo', sans-serif;
            color: white;
            background: linear-gradient(135deg, #1a0000 0%, #3d0303 50%, #1a0000 100%);
        }

        .container {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; padding: 20px; text-align: center;
        }

        .welcome-msg {
            font-size: 3.2rem; font-weight: 700;
            position: absolute;
            animation: fadeOutWelcome 2.2s forwards;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        @keyframes fadeOutWelcome {
            0% { opacity: 0; transform: scale(0.9); }
            20% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); visibility: hidden; }
        }

        .main-content {
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* أنيميشن الاسم فوق */
        .header-name {
            opacity: 0;
            transform: translateY(20px);
            animation: slideInName 1.2s ease-out 2.3s forwards;
            margin-bottom: 25px;
        }

        @keyframes slideInName {
            to { opacity: 1; transform: translateY(0); }
        }

        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem; color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .verified-badge { color: #1DA1F2; font-size: 1.3rem; }

        .links-container {
            opacity: 0;
            animation: fadeInLinks 1s ease-in 2.8s forwards;
            display: flex; flex-direction: column; gap: 12px; width: 100%;
        }

        @keyframes fadeInLinks { to { opacity: 1; } }

        .btn {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            color: white; padding: 14px; border-radius: 18px;
            text-decoration: none; font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
        }

        /* ألوان الأيقونات الأصلية */
        .fa-facebook { color: #1877F2; }
        .fa-instagram { color: #E4405F; }
        .fa-tiktok { color: #fff; text-shadow: 1px 1px #ff0050, -1px -1px #00f2ea; }
        .fa-telegram { color: #26A5E4; }
