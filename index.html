<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Ghoneim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Dancing+Script:wght@700&family=El+Messiri:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a0000 0%, #3d0303 50%, #1a0000 100%);
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.07);
            --panel-bg: rgba(40, 5, 5, 0.85);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #edeae0 0%, #e0dcd0 100%);
            --text-color: #2a0202; 
            --btn-bg: rgba(0, 0, 0, 0.05);
            --panel-bg: rgba(237, 234, 224, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.12);
            --border-color: rgba(0, 0, 0, 0.06);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            transition: background 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        color 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        border-color 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        box-shadow 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        html.invert-mode {
            filter: invert(1) hue-rotate(180deg);
        }
        html.invert-mode img,
        html.invert-mode .profile-pic,
        html.invert-mode .qr-code-container canvas,
        html.invert-mode .qr-code-container svg {
            filter: invert(1) hue-rotate(180deg);
        }

        html { font-size: var(--base-font-size, 16px); scroll-behavior: smooth; }

        body, html {
            height: 100%; width: 100%; 
            overflow-x: hidden !important; 
            overflow-y: auto !important; 
            overscroll-behavior-y: none !important; 
            touch-action: pan-y !important; 
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
            background: var(--bg-gradient);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility; 
        }

        ::-webkit-scrollbar {
            display: none;
            width: 0;
            background: transparent;
        }

        .welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: transparent;
            pointer-events: none;
        }
        
        .welcome-text {
            font-family: 'El Messiri', sans-serif;
            font-size: 3.2rem;
            font-weight: 700; 
            color: #ffffff;
            opacity: 0; 
            transform: scale(0.9) translate3d(0,0,0);
            filter: blur(10px);
            animation: welcomeAnim 2.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            will-change: transform, opacity, filter;
            backface-visibility: hidden;
            perspective: 1000px;
        }

        @keyframes welcomeAnim {
            0% { opacity: 0; transform: scale(0.8) translate3d(0,0,0); filter: blur(15px); }
            30% { opacity: 1; transform: scale(1) translate3d(0,0,0); filter: blur(0); }
            75% { opacity: 1; transform: scale(1) translate3d(0,0,0); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05) translate3d(0,0,0); filter: blur(10px); visibility: hidden; }
        }

        .container {
            display: flex; flex-direction: column; 
            justify-content: flex-start; align-items: center; 
            min-height: 100vh; padding: 20px; text-align: center;
            padding-top: 10vh;
            padding-bottom: 50px; 
        }

        /* --- زر الإعدادات (تم تحسين السلاسة والاستجابة) --- */
        .settings-icon {
            position: fixed; top: 20px; left: 20px;
            color: var(--text-color);
            background: var(--btn-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
            cursor: pointer; 
            z-index: 1005; 
            opacity: 0;
            box-shadow: 0 4px 15px var(--shadow-color);
            animation: popGlass 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 2.4s forwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            will-change: transform, box-shadow;
            transform: translate3d(0,0,0);
            backface-visibility: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .settings-icon:hover { 
            transform: translateY(-2px) scale(1.05) translate3d(0,0,0); 
            box-shadow: 0 6px 20px var(--shadow-color); 
        }
        
        /* تأثير النقر السريع للسلاسة */
        .settings-icon:active { 
            transform: scale(0.92) translate3d(0,0,0) !important; 
            transition: transform 0.1s ease !important;
        }

        .settings-icon .line {
            width: 20px; height: 2px;
            background-color: var(--text-color);
            border-radius: 2px;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease, background-color 0.3s ease;
            will-change: transform, opacity;
        }

        .settings-icon.rotate .line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .settings-icon.rotate .line:nth-child(2) { opacity: 0; transform: translateX(-10px); }
        .settings-icon.rotate .line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        
        .settings-icon.rotate:hover .line { background-color: #ff4d4d; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);
            z-index: 999; opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, backdrop-filter 0.4s ease;
            will-change: opacity, backdrop-filter;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .settings-panel {
            position: fixed; top: 20px; left: 20px;
            width: 270px; background: var(--panel-bg); backdrop-filter: blur(25px);
            z-index: 1000; box-shadow: 0 10px 40px var(--shadow-color);
            padding: 70px 20px 25px 20px; border-radius: 25px;
            border: 1px solid var(--border-color); direction: rtl;
            transform-origin: top left; 
            transform: scale(0.9) translate3d(0,0,0); 
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, opacity;
            backface-visibility: hidden;
            perspective: 1000px;
        }
        .settings-panel.active { transform: scale(1) translate3d(0,0,0); opacity: 1; visibility: visible; }
        html[dir="ltr"] .settings-panel { direction: ltr; transform-origin: top left; left: 20px; }

        .profile-pic {
            width: 90px; height: 90px; border-radius: 50%;
            background-image: url('https://i.supaimg.com/d73ac461-53ca-466f-bc1e-61f2abd83dfe/01659496-a3b9-4e9f-9a68-1da631d42a99.jpg');
            background-size: cover; background-position: center;
            border: 3px solid var(--border-color);
            box-shadow: 0 10px 25px var(--shadow-color); margin-bottom: 12px;
            opacity: 0;
            animation: popGlass 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 2.5s forwards, 
                       gentlePulse 5s ease-in-out 3.3s infinite;
            position: relative; 
            will-change: transform, box-shadow;
            transform: translate3d(0,0,0);
            backface-visibility: hidden;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1) translate3d(0,0,0); box-shadow: 0 10px 25px var(--shadow-color); opacity: 1; }
            50% { transform: scale(1.03) translate3d(0,0,0); box-shadow: 0 18px 35px var(--shadow-color); opacity: 1; }
        }

        .header-name-wrapper {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; opacity: 0; transform: translateY(15px) translate3d(0,0,0);
            animation: wrapperSlideUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) 2.7s forwards, floatName 4s ease-in-out infinite 3.9s;
            direction: ltr; gap: 6px;
            will-change: transform, opacity;
            backface-visibility: hidden;
        }
        @keyframes wrapperSlideUp { to { opacity: 1; transform: translateY(0) translate3d(0,0,0); } }
        @keyframes floatName {
            0%, 100% { transform: translateY(0) translate3d(0,0,0); }
            50% { transform: translateY(-5px) translate3d(0,0,0); }
        }

        .header-name { font-family: 'Dancing Script', cursive; font-size: 1.9rem; color: #B8860B; }
        .verify-badge { color: #1DA1F2; font-size: 1.1rem; }

        .main-content {
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; animation: fadeInAll 0.8s cubic-bezier(0.25, 1, 0.5, 1) 2.4s forwards;
            margin-bottom: 60px;
            will-change: opacity;
        }
        @keyframes fadeInAll { to { opacity: 1; } }

        .links-container { display: flex; flex-direction: column; gap: 12px; width: 100%; touch-action: pan-y; position: relative; }
        .btn-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; cursor: grab; -webkit-user-drag: none; will-change: transform, opacity; transform: translate3d(0,0,0); backface-visibility: hidden; perspective: 1000px; border-radius: 18px; }
        .btn-wrapper:active { cursor: grabbing; }

        .btn {
            background: var(--btn-bg); backdrop-filter: blur(10px); color: var(--text-color); padding: 14px; border-radius: 18px;
            text-decoration: none; font-weight: 700; font-size: 0.88rem; display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid var(--border-color); opacity: 0; width: 100%; box-shadow: 0 4px 15px var(--shadow-color);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.6s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.6s ease;
            will-change: transform, box-shadow, background-color; transform: translate3d(0,0,0); backface-visibility: hidden;
        }

        .btn:hover { transform: translateY(-5px) scale(1.02) translate3d(0,0,0); box-shadow: 0 10px 28px var(--shadow-color); }
        .btn i { filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.6)); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.6s ease; will-change: transform; }
        .btn:hover i { transform: scale(1.18) translate3d(0,0,0); }

        @keyframes buttonWave {
            0% { transform: translateY(0) translate3d(0,0,0); }
            30% { transform: translateY(-12px) scale(1.02) translate3d(0,0,0); box-shadow: 0 12px 30px var(--shadow-color); }
            60% { transform: translateY(4px) scale(0.98) translate3d(0,0,0); box-shadow: 0 2px 8px var(--shadow-color); }
            80% { transform: translateY(-2px) scale(1.01) translate3d(0,0,0); }
            100% { transform: translateY(0) scale(1) translate3d(0,0,0); }
        }
        .btn.wave-active { animation: buttonWave 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important; }

        .redirect-timer {
            background: rgba(184, 134, 11, 0.15); border: 1px solid rgba(184, 134, 11, 0.3); border-radius: 12px; font-size: 0.75rem; color: var(--text-color);
            backdrop-filter: blur(5px); font-weight: 600; display: flex; align-items: center; justify-content: center; max-height: 0;
            opacity: 0; margin-top: 0; padding: 0 15px; overflow: hidden; transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%; box-sizing: border-box; will-change: max-height, opacity, margin-top, padding; transform: translate3d(0,0,0);
        }
        .redirect-timer.active { max-height: 50px; opacity: 1; margin-top: 8px; padding: 8px 15px; }

        .cancel-btn {
            background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; border-radius: 10px; padding: 2px 8px; font-size: 0.7rem; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); font-family: 'Cairo', sans-serif; font-weight: 700; will-change: transform;
        }
        .cancel-btn:hover { background: #ff4d4d; color: #fff; transform: scale(1.08) translate3d(0,0,0); box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4); }

        .main-content .btn-wrapper:nth-child(1) .btn { animation: popGlass 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 2.8s forwards; }
        .main-content .btn-wrapper:nth-child(2) .btn { animation: popGlass 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 2.95s forwards; }
        .main-content .btn-wrapper:nth-child(3) .btn { animation: popGlass 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 3.1s forwards; }
        .main-content .btn-wrapper:nth-child(4) .btn { animation: popGlass 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 3.25s forwards; }
        .main-content .btn-wrapper:nth-child(5) .btn { animation: popGlass 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 3.4s forwards; }

        @keyframes popGlass { 0% { opacity: 0; transform: scale(1.1) translate3d(0,0,0); } 100% { opacity: 1; transform: scale(1) translate3d(0,0,0); } }

        .sortable-fallback.sortable-drag { opacity: 1 !important; transform: scale(0.9) translate3d(0,0,0) !important; box-shadow: 0 35px 65px rgba(0, 0, 0, 0.9) !important; z-index: 9999 !important; transition: none !important; cursor: grabbing !important; }
        body.light-mode .sortable-fallback.sortable-drag { box-shadow: 0 25px 55px rgba(0, 0, 0, 0.3) !important; }
        .sortable-fallback:not(.sortable-drag) { opacity: 0 !important; display: none !important; transition: none !important; }
        .sortable-ghost { opacity: 1 !important; transform: scale(1) translate3d(0,0,0) !important; }
        .sortable-ghost .btn { opacity: 0.3 !important; transform: scale(0.95) translate3d(0,0,0) !important; border: 1px dashed rgba(255, 255, 255, 0.4) !important; box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5) !important; }
        body.light-mode .sortable-ghost .btn { border: 1px dashed rgba(0, 0, 0, 0.4) !important; box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1) !important; }

        .settings-counter-wrapper { margin-top: 15px; position: relative; display: flex; flex-direction: column; align-items: center; }
        .glass-counter-box {
            font-family: 'Cairo', sans-serif; font-size: 11px; color: var(--text-color); font-weight: 700; background: var(--btn-bg); backdrop-filter: blur(10px);
            padding: 5px 12px; border-radius: 12px; border: 1px solid var(--border-color); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; z-index: 2;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform;
        }
        .glass-counter-box:hover { transform: scale(1.05) translate3d(0,0,0); }
        .info-popup {
            position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(-15px) translate3d(0,0,0);
            width: max-content; background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 10px; padding: 6px 10px;
            display: flex; align-items: center; gap: 5px; box-shadow: 0 5px 15px var(--shadow-color); opacity: 0; visibility: hidden; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1001; will-change: transform, opacity;
        }
        .info-popup.active { transform: translateX(-50%) translateY(0) translate3d(0,0,0); opacity: 1; visibility: visible; }
        .info-icon { color: #FFD700; font-size: 0.8rem; }
        .info-text { font-size: 0.65rem; font-weight: 600; color: var(--text-color); }

        .copyright-bottom { 
            position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%) translate3d(0,0,0); font-family: 'Cairo', sans-serif; font-size: 7.5px; color: #8e8e8e; 
            opacity: 0; white-space: nowrap; animation: fadeInAll 1s cubic-bezier(0.25, 1, 0.5, 1) 3.6s forwards; letter-spacing: 0.5px; will-change: opacity;
        }
        .fa-tiktok { color: #ffffff; text-shadow: -1.5px -1.5px 0 #25F4EE, 1.5px 1.5px 0 #FE2C55; }
        body.light-mode .fa-tiktok { color: #000000; }
        .mini-verify { color: #1DA1F2; font-size: 0.7rem; margin-right: 3px; }

        .acc-toggle {
            display: flex; align-items: center; justify-content: space-between; background: var(--btn-bg); padding: 12px 15px; border-radius: 15px;
            cursor: pointer; border: 1px solid var(--border-color); margin-top: 15px; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .acc-toggle:hover { background: rgba(255, 255, 255, 0.15); }
        .acc-box {
            background: rgba(255, 255, 255, 0.05); border-radius: 15px; border: 1px dashed var(--border-color); max-height: 0; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); margin-top: 5px; opacity: 0; will-change: max-height, opacity, padding;
        }
        .acc-box.open { padding: 12px; max-height: 300px; opacity: 1; }
        .acc-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        
        .acc-btn {
            background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 5px 12px; border-radius: 10px;
            cursor: pointer; font-size: 0.75rem; font-family: 'Cairo', sans-serif; font-weight: 600; transition: all 0.3s ease; will-change: transform;
        }
        .acc-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1) translate3d(0,0,0); }

        /* --- تصميم زر المشاركة الداخلي الجديد --- */
        .inner-share-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            padding: 12px 15px; border-radius: 15px; cursor: pointer;
            border: 1px solid var(--border-color); margin-top: 15px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); font-weight: 700; font-size: 0.85rem;
            color: var(--text-color); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .inner-share-btn:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
            transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .inner-share-btn i { font-size: 1.2rem; transition: transform 0.5s ease; }
        .inner-share-btn i.fa-qrcode { color: #FFD700; filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6)); }
        .inner-share-btn i.fa-copy { color: #4db8ff; filter: drop-shadow(0 0 6px rgba(77, 184, 255, 0.6)); font-size: 1.1rem; }
        .inner-share-btn:hover i.fa-qrcode { transform: rotate(15deg) scale(1.1); }
        .inner-share-btn:hover i.fa-copy { transform: rotate(-15deg) scale(1.1); }
        body.light-mode .inner-share-btn i.fa-qrcode { color: #B8860B; filter: none; }
        body.light-mode .inner-share-btn i.fa-copy { color: #0077cc; filter: none; }

        /* --- تصميم أزرار التبديل لتبدو مثل أجهزة iOS --- */
        .toggle-switch {
            width: 51px; height: 31px; 
            background-color: rgba(255, 255, 255, 0.15); 
            border-radius: 30px; 
            position: relative; cursor: pointer; border: none;
            display: flex; align-items: center; 
            transition: background-color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.2);
        }
        .toggle-switch.active { background-color: #34C759; /* لون الآيفون الأخضر */ }
        .toggle-knob {
            width: 27px; height: 27px; background: #ffffff; border-radius: 50%; 
            position: absolute; right: 2px; top: 2px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2), 0 3px 1px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.3, 1.05, 0.4, 1.05); /* ارتداد ناعم ومطابق لآبل */
            will-change: transform;
        }
        html[dir="ltr"] .toggle-knob { right: auto; left: 2px; }
        .toggle-switch.active .toggle-knob { transform: translateX(-20px) translate3d(0,0,0); }
        html[dir="ltr"] .toggle-switch.active .toggle-knob { transform: translateX(20px) translate3d(0,0,0); }
        
        body.light-mode .toggle-switch { background-color: #e9e9ea; box-shadow: inset 0 0 2px rgba(0,0,0,0.05); }
        body.light-mode .toggle-switch.active { background-color: #34C759; }

        /* --- إعدادات ألوان تباين عالي --- */
        body.high-contrast-text { --btn-bg: #000 !important; --panel-bg: #000 !important; --border-color: #fff !important; --text-color: #fff !important; }
        body.high-contrast-text * { font-weight: 900 !important; text-shadow: none !important; }
        body.high-contrast-text .header-name, body.high-contrast-text .wish, body.high-contrast-text .info-icon, body.high-contrast-text .fas.fa-sun { color: #FFD700 !important; }
        body.high-contrast-text .redirect-timer { background: #000 !important; border-color: #fff !important; }
        body.high-contrast-text .lang-slider, body.high-contrast-text .theme-slider { background: #FFD700 !important; }
        body.high-contrast-text .cancel-btn { border-color: #fff !important; color: #fff !important; background: #f00 !important; }

        body.light-mode.high-contrast-text { --btn-bg: #fff !important; --panel-bg: #fff !important; --border-color: #000 !important; --text-color: #000 !important; }
        body.light-mode.high-contrast-text .redirect-timer { color: #000 !important; background: #fff !important; border-color: #000 !important; }
        body.light-mode.high-contrast-text .header-name, body.light-mode.high-contrast-text .wish, body.light-mode.high-contrast-text i:not(.lang-option), body.light-mode.high-contrast-text .redirect-timer span { color: #000 !important; }
        body.light-mode.high-contrast-text .lang-slider, body.light-mode.high-contrast-text .theme-slider { background: #000 !important; }

        .toggle-row-btn {
            display: flex; align-items: center; justify-content: space-between; background: var(--btn-bg); padding: 10px 15px; border-radius: 15px;
            cursor: pointer; border: 1px solid var(--border-color); margin-top: 10px; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .toggle-row-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .custom-switch {
            position: relative; width: 60px; height: 28px; background: rgba(0,0,0,0.3); border-radius: 20px; display: flex; align-items: center; justify-content: space-between;
            padding: 0; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); border: 1px solid var(--border-color); direction: ltr; 
        }
        body.light-mode .custom-switch { background: rgba(0,0,0,0.08); box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .custom-slider {
            position: absolute; top: 2px; left: 2px; width: 28px; height: 22px; border-radius: 15px; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.6s ease;
            z-index: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.2); will-change: transform;
        }
        .lang-slider { background: #4db8ff; }
        .lang-option { font-size: 0.65rem; font-weight: 800; z-index: 2; width: 50%; text-align: center; transition: color 0.5s ease; color: #888; }
        .lang-option.active { color: #ffffff; }
        body.light-mode .lang-option { color: #888; }
        body.light-mode .lang-option.active { color: #ffffff; }

        .theme-switch { padding: 0 8px; }
        .theme-slider { background: #FFD700; }
        body.light-mode .theme-slider { background: #555; transform: translateX(28px) translate3d(0,0,0); }
        .theme-icon { font-size: 0.75rem; z-index: 2; transition: color 0.5s ease; }
        #icon-sun { color: #fff; } #icon-moon { color: #888; }
        body.light-mode #icon-sun { color: #888; }
        body.light-mode #icon-moon { color: #fff; }

        /* --- أكواد نافذة الباركود --- */
        .qr-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9) translate3d(0,0,0);
            background: var(--panel-bg); backdrop-filter: blur(25px); z-index: 1006; /* يجب أن يكون أعلى من القائمة */
            box-shadow: 0 10px 40px var(--shadow-color); padding: 30px; border-radius: 25px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; gap: 15px; opacity: 0; visibility: hidden; 
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); width: 280px; text-align: center;
            will-change: transform, opacity; backface-visibility: hidden; perspective: 1000px;
        }
        .qr-popup.active { transform: translate(-50%, -50%) scale(1) translate3d(0,0,0); opacity: 1; visibility: visible; }

        .qr-code-container { background: #ffffff; padding: 15px; border-radius: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        /* التعديل هنا ليدعم الـ SVG والـ Canvas */
        .qr-code-container canvas, 
        .qr-code-container svg { width: 180px !important; height: 180px !important; display: block; border-radius: 10px; }

        .close-qr { 
            position: absolute; top: 15px; left: 15px; cursor: pointer; color: var(--text-color); opacity: 0.6; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform; font-size: 1.2rem;
        }
        .close-qr:hover { opacity: 1; transform: scale(1.2) translate3d(0,0,0); color: #ff4d4d; }
        html[dir="ltr"] .close-qr { left: auto; right: 15px; }

        .copy-link-btn {
            background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 20px; 
            border-radius: 15px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: bold; display: flex; gap: 8px; align-items: center; 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); width: 100%; justify-content: center; will-change: transform;
        }
        .copy-link-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-3px) scale(1.02) translate3d(0,0,0); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        body.light-mode .copy-link-btn:hover { background: rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="">

    <div class="welcome-screen">
        <div class="welcome-text" id="welcome-msg">مرحباً</div>
    </div>

    <div class="settings-icon" id="settingsBtn">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
    </div>
    
    <div class="overlay" id="overlay"></div>

    <div class="qr-popup" id="qrPopup">
        <i class="fas fa-times close-qr" id="closeQrBtn"></i>
        <h3 id="qr-title" style="font-size: 1.1rem; font-weight: 700;">مشاركة الموقع الخاص بي</h3>
        <div class="qr-code-container" id="qrCodeContainer">
            </div>
        <button class="copy-link-btn" id="copyLinkBtn">
            <i class="fas fa-copy"></i> <span id="copy-text">نسخ الرابط</span>
        </button>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div id="modeToggle" class="toggle-row-btn">
            <span id="modeText" style="font-size: 0.85rem; font-weight: 600;">الوضع الفاتح</span>
            <div class="custom-switch theme-switch" dir="ltr">
                <div class="custom-slider theme-slider" id="themeSlider"></div>
                <i class="fas fa-sun theme-icon" id="icon-sun"></i>
                <i class="fas fa-moon theme-icon" id="icon-moon"></i>
            </div>
        </div>

        <div id="langToggle" class="toggle-row-btn">
            <span id="lang-label-text" style="font-size: 0.85rem; font-weight: 600; color: var(--text-color);">اللغة</span>
            <div class="custom-switch" dir="ltr">
                <div class="custom-slider lang-slider" id="langSlider"></div>
                <span class="lang-option active" id="lang-ar">AR</span>
                <span class="lang-option" id="lang-en">EN</span>
            </div>
        </div>

        <div style="margin-top: 15px; font-size: 0.75rem; background: var(--btn-bg); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 5px; justify-content: center;">
            <span id="web-contrib">مشارك في +<span id="web-counter">0</span> Web</span>
            <i class="fas fa-check-circle mini-verify"></i>
        </div>

        <div class="acc-toggle" id="accToggle">
            <span id="acc-title" style="font-size: 0.85rem; font-weight: 600;">الوصول</span>
            <i class="fas fa-universal-access"></i>
        </div>
        <div class="acc-box" id="accBox">
            <div style="margin-bottom: 10px;">
                <div class="acc-row" style="margin-bottom: 0;">
                    <span id="font-size-label" style="font-size: 0.75rem;">حجم الخط</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="acc-btn" onclick="changeFontSize(2)">+</button>
                        <button class="acc-btn" onclick="changeFontSize(-2)">-</button>
                    </div>
                </div>
                <div id="reset-font-container" style="display: flex; justify-content: flex-end; max-height: 0; opacity: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: max-height, opacity;">
                    <button class="acc-btn" id="reset-font-btn" onclick="resetFontSize()" style="font-family: 'Cairo', sans-serif; font-size: 0.7rem; font-weight: 700; padding: 4px 12px; margin-top: 6px;">الافتراضي</button>
                </div>
            </div>
            
            <div class="acc-row">
                <span id="contrast-label" style="font-size: 0.75rem;">تباين عالي</span>
                <div class="toggle-switch" id="contrastBtn">
                    <div class="toggle-knob"></div>
                </div>
            </div>
            <div class="acc-row">
                <span id="invert-label" style="font-size: 0.75rem;">عكس اللون</span>
                <div class="toggle-switch" id="invertBtn">
                    <div class="toggle-knob"></div>
                </div>
            </div>
        </div>

        <div class="inner-share-btn" id="innerShareBtn">
            <i class="fas fa-qrcode"></i>
            <span id="share-panel-text">مشاركة الموقع</span>
            <i class="fas fa-copy"></i>
        </div>

        <div class="settings-counter-wrapper">
            <div class="glass-counter-box" id="glassCounter">
                <i class="fas fa-users" style="font-size: 0.7rem; opacity: 0.7;"></i>
                <span id="visit-counter">0</span>
            </div>
            <div class="info-popup" id="infoPopup">
                <i class="fas fa-exclamation-circle info-icon"></i>
                <span class="info-text" id="visitor-msg">عدد زوار الموقع</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="profile-pic"></div>
        <div class="header-name-wrapper">
            <div class="header-name">Ahmed Ghoneim</div>
            <i class="fas fa-check-circle verify-badge"></i>
        </div>
        <div class="main-content">
            <div class="links-container">
                <div class="btn-wrapper">
                    <a href="https://www.facebook.com/share/18k8Qf8y4P/" class="btn"><i class="fab fa-facebook" style="color: #1877F2;"></i> Facebook</a>
                    <div class="redirect-timer"></div>
                </div>
                <div class="btn-wrapper">
                    <a href="https://www.instagram.com/ahmed.8oneim?igsh=cHZnMTRpMTV2aTJk" class="btn"><i class="fab fa-instagram" style="color: #E4405F;"></i> Instagram</a>
                    <div class="redirect-timer"></div>
                </div>
                <div class="btn-wrapper">
                    <a href="https://www.tiktok.com/@a7med.8oneim?_r=1&_t=ZS-956Zeogmk80" class="btn"><i class="fab fa-tiktok"></i> TikTok</a>
                    <div class="redirect-timer"></div>
                </div>
                <div class="btn-wrapper">
                    <a href="https://t.me/ahmed_8oneim" class="btn"><i class="fab fa-telegram" style="color: #24A1DE;"></i> Telegram</a>
                    <div class="redirect-timer"></div>
                </div>
                <div class="btn-wrapper">
                    <a href="mailto:qwrtreu1245@gmail.com" class="btn"><i class="fas fa-envelope" style="color: #EA4335;"></i> Gmail</a>
                    <div class="redirect-timer"></div>
                </div>
            </div>
            <div class="wish" id="day-wish" style="font-family: 'Dancing Script', cursive; font-size: 0.95rem; color: #B8860B; margin-top: 25px; display: flex; align-items: center; gap: 8px;">
                Have a nice day <i class="fas fa-sparkles" style="font-size: 0.8rem;"></i>
            </div>
        </div>
    </div>

    <div class="copyright-bottom" id="copyright-text">جميع الحقوق محفوظة للمطور أحمد غنيم</div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        const translations = {
            ar: { welcome: "مرحباً", modeLight: "الوضع الفاتح", modeDark: "الوضع الداكن", languageLabel: "اللغة", webContrib: "مشارك في +", accTitle: "الوصول", fontSize: "حجم الخط", defaultFont: "الافتراضي", contrast: "تباين عالي", invertColors: "عكس اللون", visitorTitle: "عدد زوار الموقع", copyright: "جميع الحقوق محفوظة للمطور أحمد غنيم", redirect: "سيتم انتقالك خلال", redirectingNow: "جاري الانتقال...", cancel: "إلغاء", shareSite: "مشاركة الموقع الخاص بي", copyLink: "نسخ الرابط", copied: "تم النسخ!", sharePanelText: "مشاركة الموقع" },
            en: { welcome: "Welcome", modeLight: "Light Mode", modeDark: "Dark Mode", languageLabel: "Language", webContrib: "Participant in +", accTitle: "Accessibility", fontSize: "Font Size", defaultFont: "Default", contrast: "High Contrast", invertColors: "Invert Colors", visitorTitle: "Visitor Count", copyright: "All Rights Reserved to Developer Ahmed Ghoneim", redirect: "Redirecting in", redirectingNow: "Redirecting...", cancel: "Cancel", shareSite: "Share my website", copyLink: "Copy Link", copied: "Copied!", sharePanelText: "Share Website" }
        };

        let currentLang = 'ar';
        let isRedirecting = false;
        let redirectInterval;
        
        let baseVisits = 23996;
        let totalVisits = baseVisits;

        fetch('https://api.counterapi.dev/v1/ahmedghoneim_portfolio/visits/up')
            .then(response => response.json())
            .then(data => { totalVisits = baseVisits + data.count; })
            .catch(error => {
                let localVisits = localStorage.getItem('local_visits') || 0;
                localVisits++;
                localStorage.setItem('local_visits', localVisits);
                totalVisits = baseVisits + parseInt(localVisits);
            });

        function triggerWaveAnimation() {
            const buttons = document.querySelectorAll('.links-container .btn');
            buttons.forEach((btn, index) => {
                btn.style.animation = 'none';
                btn.style.opacity = '1';

                btn.classList.remove('wave-active');
                void btn.offsetWidth; 
                
                setTimeout(() => {
                    window.requestAnimationFrame(() => {
                        btn.classList.add('wave-active');
                    });
                }, index * 120); 
                
                setTimeout(() => {
                    window.requestAnimationFrame(() => {
                        btn.classList.remove('wave-active');
                    });
                }, (index * 120) + 850); 
            });
        }

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if (isRedirecting) { e.preventDefault(); return; }
                
                e.preventDefault();
                isRedirecting = true;
                const targetUrl = this.href;
                const timerDisplay = this.nextElementSibling;
                let count = 3;

                document.querySelectorAll('.redirect-timer').forEach(el => { el.classList.remove('active'); el.innerHTML = ''; });

                timerDisplay.classList.add('active');
                const t = translations[currentLang];
                
                timerDisplay.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;">
                        <i class="fas fa-spinner fa-spin" id="timer-icon"></i> 
                        <span id="timer-text">${t.redirect} <span id="timer-count">${count}</span></span>
                        <button class="cancel-btn" id="cancel-btn">${t.cancel}</button>
                    </div>
                `;

                const countSpan = timerDisplay.querySelector('#timer-count');
                const cancelBtn = timerDisplay.querySelector('#cancel-btn');
                const timerIcon = timerDisplay.querySelector('#timer-icon');
                const timerText = timerDisplay.querySelector('#timer-text');

                cancelBtn.addEventListener('click', (ev) => {
                    ev.preventDefault(); ev.stopPropagation(); clearInterval(redirectInterval);
                    timerDisplay.classList.remove('active'); isRedirecting = false;
                });

                redirectInterval = setInterval(() => {
                    count--;
                    if (count > 0) { countSpan.innerText = count; } 
                    else if (count === 0) {
                        clearInterval(redirectInterval); cancelBtn.style.display = 'none'; 
                        timerIcon.className = 'fas fa-check-circle'; timerIcon.style.color = '#4CAF50';
                        timerText.innerHTML = t.redirectingNow;
                        
                        setTimeout(() => {
                            window.location.href = targetUrl;
                            setTimeout(() => { timerDisplay.classList.remove('active'); isRedirecting = false; }, 600);
                        }, 500);
                    }
                }, 1000);
            });
        });

        function updateLanguage() {
            const t = translations[currentLang];
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.getElementById('welcome-msg').innerText = t.welcome;
            document.getElementById('modeText').innerText = document.body.classList.contains('light-mode') ? t.modeDark : t.modeLight;
            document.getElementById('lang-label-text').innerText = t.languageLabel;
            document.getElementById('web-contrib').innerHTML = `${t.webContrib}<span id="web-counter">100</span> Web`;
            document.getElementById('acc-title').innerText = t.accTitle;
            document.getElementById('font-size-label').innerText = t.fontSize;
            document.getElementById('reset-font-btn').innerText = t.defaultFont;
            document.getElementById('contrast-label').innerText = t.contrast;
            document.getElementById('invert-label').innerText = t.invertColors;
            document.getElementById('visitor-msg').innerText = t.visitorTitle;
            document.getElementById('copyright-text').innerText = t.copyright;
            document.getElementById('qr-title').innerText = t.shareSite;
            document.getElementById('copy-text').innerText = t.copyLink;
            document.getElementById('share-panel-text').innerText = t.sharePanelText;

            const langSlider = document.getElementById('langSlider');
            const langAr = document.getElementById('lang-ar');
            const langEn = document.getElementById('lang-en');
            
            if (currentLang === 'ar') {
                window.requestAnimationFrame(() => {
                    langSlider.style.transform = 'translateX(0) translate3d(0,0,0)';
                    langAr.classList.add('active'); langEn.classList.remove('active');
                });
            } else {
                window.requestAnimationFrame(() => {
                    langSlider.style.transform = 'translateX(28px) translate3d(0,0,0)';
                    langEn.classList.add('active'); langAr.classList.remove('active');
                });
            }
        }

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const overlay = document.getElementById('overlay');
        const qrPopup = document.getElementById('qrPopup');

        const closePanelFunc = () => {
            const isActive = settingsPanel.classList.contains('active');
            window.requestAnimationFrame(() => {
                settingsBtn.classList.remove('rotate'); 
                settingsPanel.classList.remove('active'); 
                if (!qrPopup.classList.contains('active')) {
                    overlay.classList.remove('active'); 
                }
            });
            if (isActive) { triggerWaveAnimation(); }
        };

        settingsBtn.onclick = () => { 
            const isPanelOpen = settingsPanel.classList.contains('active');
            if(!isPanelOpen) {
                window.requestAnimationFrame(() => {
                    settingsBtn.classList.add('rotate'); 
                    settingsPanel.classList.add('active'); 
                    overlay.classList.add('active'); 
                });
                triggerWaveAnimation(); 
                setTimeout(() => { 
                    animateCounter('web-counter', 100, 1500); 
                    animateCounter('visit-counter', totalVisits, 2000);
                }, 400);
            } else {
                closePanelFunc();
            }
        };

        function animateCounter(id, target, duration) {
            const el = document.getElementById(id);
            let startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 4);
                el.innerText = Math.floor(easeProgress * target).toLocaleString();
                if (progress < 1) { window.requestAnimationFrame(step); } 
                else { el.innerText = Math.floor(target).toLocaleString(); }
            }
            window.requestAnimationFrame(step);
        }

        document.getElementById('modeToggle').onclick = () => { document.body.classList.toggle('light-mode'); updateLanguage(); };
        document.getElementById('langToggle').onclick = () => { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateLanguage(); };
        document.getElementById('accToggle').onclick = () => document.getElementById('accBox').classList.toggle('open');

        let currentSize = 16;
        function changeFontSize(step) {
            currentSize += step;
            if (currentSize >= 12 && currentSize <= 24) { document.documentElement.style.setProperty('--base-font-size', currentSize + 'px'); } 
            else { currentSize -= step; }
            toggleResetFontBtn();
        }

        function resetFontSize() {
            currentSize = 16; document.documentElement.style.setProperty('--base-font-size', currentSize + 'px'); toggleResetFontBtn();
        }

        function toggleResetFontBtn() {
            const resetContainer = document.getElementById('reset-font-container');
            if (currentSize !== 16) { resetContainer.style.maxHeight = '30px'; resetContainer.style.opacity = '1'; } 
            else { resetContainer.style.maxHeight = '0'; resetContainer.style.opacity = '0'; }
        }

        document.getElementById('contrastBtn').onclick = function() { this.classList.toggle('active'); document.body.classList.toggle('high-contrast-text'); };
        document.getElementById('invertBtn').onclick = function() { this.classList.toggle('active'); document.documentElement.classList.toggle('invert-mode'); };
        document.getElementById('glassCounter').onclick = (e) => { e.stopPropagation(); document.getElementById('infoPopup').classList.toggle('active'); };

        const linksContainerEl = document.querySelector('.links-container');
        new Sortable(linksContainerEl, {
            animation: 350, easing: "cubic-bezier(0.34, 1.56, 0.64, 1)", ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', 
            fallbackClass: 'sortable-fallback', forceFallback: true, fallbackTolerance: 3, delay: 50, delayOnTouchOnly: true, swapThreshold: 0.65, direction: 'vertical'
        });

        // ==========================================
        // وظائف الباركود ومشاركة الموقع (تم التعديل لـ SVG لتجنب مشكلة الـ CORS والمربع الأبيض)
        // ==========================================
        const innerShareBtn = document.getElementById('innerShareBtn');
        const closeQrBtn = document.getElementById('closeQrBtn');
        const qrCodeContainer = document.getElementById('qrCodeContainer');
        const copyLinkBtn = document.getElementById('copyLinkBtn');

        // فتح الباركود من داخل القائمة
        innerShareBtn.addEventListener('click', () => {
            const currentUrl = window.location.href; 
            
            // تفريغ الحاوية حتى لا تتكرر الأكواد عند الضغط أكثر من مرة
            qrCodeContainer.innerHTML = '';
            
            // إعداد وإنشاء الباركود بشكله الجديد الدائري مع الصورة (تم تغيير النوع إلى svg)
            const qrCode = new QRCodeStyling({
                width: 180,
                height: 180,
                type: "svg", // استخدام SVG يحل مشكلة حظر الصور الخارجية
                data: currentUrl,
                image: "https://i.supaimg.com/d73ac461-53ca-466f-bc1e-61f2abd83dfe/01659496-a3b9-4e9f-9a68-1da631d42a99.jpg",
                dotsOptions: {
                    color: "#000000",
                    type: "rounded"
                },
                cornersSquareOptions: {
                    color: "#000000",
                    type: "extra-rounded"
                },
                cornersDotOptions: {
                    color: "#000000",
                    type: "dot"
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                imageOptions: {
                    // تمت إزالة crossOrigin لتجنب مشاكل سياسة المتصفح مع الصور الخارجية
                    margin: 5,
                    imageSize: 0.4
                }
            });
            
            // إضافة الباركود إلى الحاوية
            qrCode.append(qrCodeContainer);

            window.requestAnimationFrame(() => {
                qrPopup.classList.add('active');
            });
        });

        const closeQrFunc = () => {
            window.requestAnimationFrame(() => {
                qrPopup.classList.remove('active');
                // إذا كانت القائمة مغلقة، أغلق الـ overlay
                if (!settingsPanel.classList.contains('active')) { overlay.classList.remove('active'); }
            });
        };

        closeQrBtn.onclick = closeQrFunc;

        overlay.onclick = () => { closePanelFunc(); closeQrFunc(); };

        copyLinkBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const copyText = document.getElementById('copy-text');
                const t = translations[currentLang];
                copyText.innerText = t.copied;
                setTimeout(() => { copyText.innerText = t.copyLink; }, 2000);
            });
        });

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    </script>
</body>
</html>
