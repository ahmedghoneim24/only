<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Ghoneim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&family=El+Messiri:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a0000 0%, #3d0303 50%, #1a0000 100%);
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.07);
            --panel-bg: rgba(40, 5, 5, 0.85);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #edeae0 0%, #e0dcd0 100%);
            --text-color: #2a0202; 
            --btn-bg: rgba(0, 0, 0, 0.05);
            --panel-bg: rgba(237, 234, 224, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.12);
            --border-color: rgba(0, 0, 0, 0.06);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            transition: background 0.7s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.5s ease, 
                        border-color 0.5s ease, 
                        box-shadow 0.5s ease,
                        transform 0.6s ease;
        }
        
        html { font-size: var(--base-font-size, 16px); }

        body, html {
            height: 100%; width: 100%; overflow-x: hidden;
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
            background: var(--bg-gradient);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: transparent;
            pointer-events: none;
        }
        
        .welcome-text {
            font-family: 'El Messiri', sans-serif;
            font-size: 3.2rem;
            font-weight: 700; 
            color: #ffffff;
            opacity: 0; 
            transform: scale(0.9);
            filter: blur(10px);
            animation: welcomeAnim 2.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @keyframes welcomeAnim {
            0% { opacity: 0; transform: scale(0.8); filter: blur(15px); }
            30% { opacity: 1; transform: scale(1); filter: blur(0); }
            75% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(10px); visibility: hidden; }
        }

        .container {
            position: relative; 
            z-index: 1;         
            display: flex; flex-direction: column; 
            justify-content: flex-start; align-items: center; 
            min-height: 100vh; padding: 20px; text-align: center;
            padding-top: 5vh;
        }

        /* --- صورة الغلاف --- */
        .cover-photo {
            position: absolute;
            top: 3vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 80vw; 
            max-width: 300px; 
            height: 140px; 
            background-image: url('https://i.supaimg.com/d73ac461-53ca-466f-bc1e-61f2abd83dfe/0503c20a-aced-4f76-8a44-7ae269b6123a.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0; 
            pointer-events: none;
            -webkit-mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, #000 10%, transparent 80%);
            mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, #000 10%, transparent 80%);
            opacity: 0;
            /* تم زيادة وقت التأخير لـ 2.5 ثانية عشان تظهر بعد ما الموقع يفتح */
            animation: fadeInCover 1.5s ease-out 2.5s forwards; 
        }

        @keyframes fadeInCover {
            to { opacity: 1; }
        }
        /* -------------------------------------- */

        .settings-icon {
            position: fixed; top: 20px; left: 20px;
            font-size: 1.2rem; color: var(--text-color);
            cursor: pointer; z-index: 100; opacity: 0;
            animation: fadeInAll 0.5s ease-in 2.4s forwards;
        }
        .settings-icon.rotate { transform: rotate(180deg); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);
            z-index: 999; opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .settings-panel {
            position: fixed; top: 20px; left: 20px;
            width: 270px; background: var(--panel-bg); backdrop-filter: blur(25px);
            z-index: 1000; box-shadow: 0 10px 40px var(--shadow-color);
            padding: 35px 20px 25px 20px; border-radius: 25px;
            border: 1px solid var(--border-color); direction: rtl;
            transform-origin: top left; 
            transform: scale(0); 
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .settings-panel.active { 
            transform: scale(1); 
            opacity: 1;
            visibility: visible;
        }
        html[dir="ltr"] .settings-panel { direction: ltr; transform-origin: top left; left: 20px; }

        .profile-pic {
            position: relative; z-index: 2; 
            width: 90px; height: 90px; border-radius: 50%;
            background-image: url('Https://i.supaimg.com/d73ac461-53ca-466f-bc1e-61f2abd83dfe/01659496-a3b9-4e9f-9a68-1da631d42a99.jpg');
            background-size: cover; background-position: center;
            border: 3px solid var(--border-color);
            box-shadow: 0 10px 25px var(--shadow-color); margin-bottom: 12px;
            opacity: 0;
            animation: slideDownPic 1s ease-out 2.5s forwards;
        }
        @keyframes slideDownPic { to { opacity: 1; transform: translateY(0); } }

        .header-name-wrapper {
            position: relative; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; opacity: 0; transform: translateY(15px);
            animation: wrapperSlideUp 1s ease-out 2.7s forwards, floatName 3s ease-in-out infinite 3.7s;
            direction: ltr;
            gap: 6px;
        }
        @keyframes wrapperSlideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes floatName {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .header-name { 
            font-family: 'Dancing Script', cursive; 
            font-size: 1.9rem; 
            color: #B8860B; 
        }
        
        .verify-badge { color: #1DA1F2; font-size: 1.1rem; }

        .main-content {
            position: relative; z-index: 2;
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; animation: fadeInAll 0.5s ease-in 2.4s forwards;
            margin-bottom: 60px;
        }
        @keyframes fadeInAll { to { opacity: 1; } }

        .links-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 100%; 
        }

        .btn-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn {
            background: var(--btn-bg); backdrop-filter: blur(10px); 
            color: var(--text-color); padding: 14px; border-radius: 18px;
            text-decoration: none; font-weight: 700; font-size: 0.88rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid var(--border-color);
            opacity: 0; width: 100%;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        .btn i {
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.6));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.4s ease;
        }

        .btn:hover i { transform: scale(1.15); }

        .redirect-timer {
            background: rgba(184, 134, 11, 0.15);
            border: 1px solid rgba(184, 134, 11, 0.3);
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-color);
            backdrop-filter: blur(5px);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            padding: 0 15px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            box-sizing: border-box;
        }

        .redirect-timer.active {
            max-height: 50px;
            opacity: 1;
            margin-top: 8px;
            padding: 8px 15px;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
        }
        .cancel-btn:hover { 
            background: #ff4d4d; 
            color: #fff; 
            transform: scale(1.05); 
            box-shadow: 0 2px 10px rgba(255, 77, 77, 0.3);
        }

        .main-content .btn-wrapper:nth-child(1) .btn { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.8s forwards; }
        .main-content .btn-wrapper:nth-child(2) .btn { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.95s forwards; }
        .main-content .btn-wrapper:nth-child(3) .btn { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.1s forwards; }
        .main-content .btn-wrapper:nth-child(4) .btn { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.25s forwards; }
        .main-content .btn-wrapper:nth-child(5) .btn { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.4s forwards; }

        @keyframes popGlass { 0% { opacity: 0; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        .settings-counter-wrapper {
            margin-top: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-counter-box {
            font-family: 'Cairo', sans-serif; 
            font-size: 11px;
            color: var(--text-color); 
            font-weight: 700; 
            background: var(--btn-bg);
            backdrop-filter: blur(10px);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            z-index: 2;
        }

        .info-popup {
            position: absolute;
            top: calc(100% + 8px); 
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: max-content;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 5px 15px var(--shadow-color);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1001;
        }
        .info-popup.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .info-icon { color: #FFD700; font-size: 0.8rem; }
        .info-text { font-size: 0.65rem; font-weight: 600; color: var(--text-color); }

        .copyright-bottom { 
            position: fixed; 
            bottom: 8px; 
            left: 50%;
            transform: translateX(-50%); 
            font-family: 'Cairo', sans-serif; 
            font-size: 7.5px; 
            color: #8e8e8e; 
            opacity: 0; 
            white-space: nowrap;
            animation: fadeInAll 0.8s ease-in 3.6s forwards; 
            letter-spacing: 0.5px;
        }

        .fa-tiktok { color: #ffffff; text-shadow: -1.5px -1.5px 0 #25F4EE, 1.5px 1.5px 0 #FE2C55; }
        body.light-mode .fa-tiktok { color: #000000; }
        .mini-verify { color: #1DA1F2; font-size: 0.7rem; margin-right: 3px; }

        .acc-toggle {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--btn-bg); padding: 12px 15px; border-radius: 15px;
            cursor: pointer; border: 1px solid var(--border-color); margin-top: 15px;
        }
        .acc-box {
            background: rgba(255, 255, 255, 0.05); border-radius: 15px;
            border: 1px dashed var(--border-color); max-height: 0; overflow: hidden;
            transition: all 0.4s ease; margin-top: 5px; opacity: 0;
        }
        .acc-box.open { padding: 12px; max-height: 200px; opacity: 1; }
        .acc-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .acc-btn {
            background: var(--btn-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 5px 12px; border-radius: 10px;
            cursor: pointer; font-size: 0.75rem;
        }

        .toggle-switch {
            width: 44px; height: 24px; background: rgba(255, 255, 255, 0.15);
            border-radius: 15px; position: relative; cursor: pointer;
            border: 1px solid var(--border-color); display: flex; align-items: center;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        .toggle-switch.active { background: #4CAF50; border-color: #4CAF50; }
        .toggle-knob {
            width: 18px; height: 18px; background: #ffffff; border-radius: 50%;
            position: absolute; right: 3px; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        html[dir="ltr"] .toggle-knob { right: auto; left: 3px; }

        .toggle-switch.active .toggle-knob { transform: translateX(-20px); }
        html[dir="ltr"] .toggle-switch.active .toggle-knob { transform: translateX(20px); }

        body.high-contrast-text {
            --btn-bg: #000000 !important;
            --panel-bg: #000000 !important;
            --border-color: #ffffff !important;
            --text-color: #ffffff !important;
        }
        body.high-contrast-text * { font-weight: 900 !important; text-shadow: none !important; }
        body.high-contrast-text .header-name,
        body.high-contrast-text .wish,
        body.high-contrast-text .info-icon,
        body.high-contrast-text .fas.fa-sun {
            color: #FFD700 !important; 
        }
        body.high-contrast-text .redirect-timer { background: #000 !important; border-color: #fff !important; }
        body.high-contrast-text .lang-slider,
        body.high-contrast-text .theme-slider { background: #FFD700 !important; }
        body.high-contrast-text .cancel-btn { border-color: #fff !important; color: #fff !important; background: #f00 !important; }

        body.light-mode.high-contrast-text {
            --btn-bg: #ffffff !important;
            --panel-bg: #ffffff !important;
            --border-color: #000000 !important;
            --text-color: #000000 !important;
        }
        
        body.light-mode.high-contrast-text .redirect-timer {
            color: #000000 !important;
            background: #ffffff !important;
            border-color: #000000 !important;
        }
        
        body.light-mode.high-contrast-text .header-name,
        body.light-mode.high-contrast-text .wish,
        body.light-mode.high-contrast-text i:not(.lang-option),
        body.light-mode.high-contrast-text .redirect-timer span {
            color: #000000 !important;
        }
        
        body.light-mode.high-contrast-text .lang-slider,
        body.light-mode.high-contrast-text .theme-slider { background: #000000 !important; }

        .toggle-row-btn {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--btn-bg); padding: 10px 15px; border-radius: 15px;
            cursor: pointer; border: 1px solid var(--border-color); margin-top: 10px;
        }
        .custom-switch {
            position: relative; width: 60px; height: 28px; background: rgba(0,0,0,0.3);
            border-radius: 20px; display: flex; align-items: center; justify-content: space-between;
            padding: 0; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); border: 1px solid var(--border-color);
            direction: ltr; 
        }
        body.light-mode .custom-switch { background: rgba(0,0,0,0.08); box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .custom-slider {
            position: absolute; top: 2px; left: 2px; width: 28px; height: 22px;
            border-radius: 15px; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease;
            z-index: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .lang-slider { background: #4db8ff; }
        .lang-option {
            font-size: 0.65rem; font-weight: 800; z-index: 2; width: 50%;
            text-align: center; transition: color 0.4s ease; color: #888;
        }
        .lang-option.active { color: #ffffff; }
        body.light-mode .lang-option { color: #888; }
        body.light-mode .lang-option.active { color: #ffffff; }

        .theme-switch { padding: 0 8px; }
        .theme-slider { background: #FFD700; }
        body.light-mode .theme-slider { background: #555; transform: translateX(28px); }
        .theme-icon { font-size: 0.75rem; z-index: 2; transition: color 0.4s ease; }
        #icon-sun { color: #fff; } 
        #icon-moon { color: #888; }
        body.light-mode #icon-sun { color: #888; }
        body.light-mode #icon-moon { color: #fff; }

    </style>
</head>

            </div>
            <div class="wish" id="day-wish" style="font-family: 'Dancing Script', cursive; font-size: 0.95rem; color: #B8860B; margin-top: 25px; display: flex; align-items: center; gap: 8px;">
                Have a nice day <i class="fas fa-sparkles" style="font-size: 0.8rem;"></i>
            </div>
        </div>
    </div>

    <div class="copyright-bottom" id="copyright-text">جميع الحقوق محفوظة للمطور أحمد غنيم</div>

    <script>
        const translations = {
            ar: {
                welcome: "مرحباً",
                modeLight: "الوضع الفاتح",
                modeDark: "الوضع الداكن",
                languageLabel: "اللغة",
                webContrib: "مشارك في +",
                accTitle: "الوصول",
                fontSize: "حجم الخط",
                contrast: "تباين عالي",
                visitorTitle: "عدد زوار الموقع",
                copyright: "جميع الحقوق محفوظة للمطور أحمد غنيم",
                redirect: "سيتم انتقالك خلال",
                redirectingNow: "جاري الانتقال...",
                cancel: "إلغاء"
            },
            en: {
                welcome: "Welcome",
                modeLight: "Light Mode",
                modeDark: "Dark Mode",
                languageLabel: "Language",
                webContrib: "Participant in +",
                accTitle: "Accessibility",
                fontSize: "Font Size",
                contrast: "High Contrast",
                visitorTitle: "Visitor Count",
                copyright: "All Rights Reserved to Developer Ahmed Ghoneim",
                redirect: "Redirecting in",
                redirectingNow: "Redirecting...",
                cancel: "Cancel"
            }
        };

        let currentLang = 'ar';
        let isRedirecting = false;
        let redirectInterval;

        let baseVisits = 20560;
        let totalVisits = baseVisits;

        fetch('https://api.counterapi.dev/v1/ahmedghoneim_portfolio/visits/up')
            .then(response => response.json())
            .then(data => {
                totalVisits = baseVisits + data.count;
            })
            .catch(error => {
                let localVisits = localStorage.getItem('local_visits') || 0;
                localVisits++;
                localStorage.setItem('local_visits', localVisits);
                totalVisits = baseVisits + parseInt(localVisits);
            });

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if (isRedirecting) {
                    e.preventDefault();
                    return;
                }
                
                e.preventDefault();
                isRedirecting = true;
                const targetUrl = this.href;
                const timerDisplay = this.nextElementSibling;
                let count = 3;

                document.querySelectorAll('.redirect-timer').forEach(el => {
                    el.classList.remove('active');
                    el.innerHTML = '';
                });

                timerDisplay.classList.add('active');
                const t = translations[currentLang];
                
                timerDisplay.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;">
                        <i class="fas fa-spinner fa-spin" id="timer-icon"></i> 
                        <span id="timer-text">${t.redirect} <span id="timer-count">${count}</span></span>
                        <button class="cancel-btn" id="cancel-btn">${t.cancel}</button>
                    </div>
                `;

                const countSpan = timerDisplay.querySelector('#timer-count');
                const cancelBtn = timerDisplay.querySelector('#cancel-btn');
                const timerIcon = timerDisplay.querySelector('#timer-icon');
                const timerText = timerDisplay.querySelector('#timer-text');

                cancelBtn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    clearInterval(redirectInterval);
                    timerDisplay.classList.remove('active');
                    isRedirecting = false;
                });

                redirectInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countSpan.innerText = count;
                    } else if (count === 0) {
                        clearInterval(redirectInterval);
                        cancelBtn.style.display = 'none'; 
                        timerIcon.className = 'fas fa-check-circle';
                        timerIcon.style.color = '#4CAF50';
                        timerText.innerHTML = t.redirectingNow;
                        
                        setTimeout(() => {
                            window.open(targetUrl, '_blank');
                            
                            setTimeout(() => {
                                timerDisplay.classList.remove('active');
                                isRedirecting = false;
                            }, 500);
                        }, 500);
                    }
                }, 1000);
            });
        });

        function updateLanguage() {
            const t = translations[currentLang];
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.getElementById('welcome-msg').innerText = t.welcome;
            document.getElementById('modeText').innerText = document.body.classList.contains('light-mode') ? t.modeDark : t.modeLight;
            document.getElementById('lang-label-text').innerText = t.languageLabel;
            document.getElementById('web-contrib').innerHTML = `${t.webContrib}<span id="web-counter">100</span> Web`;
            document.getElementById('acc-title').innerText = t.accTitle;
            document.getElementById('font-size-label').innerText = t.fontSize;
            document.getElementById('contrast-label').innerText = t.contrast;
            document.getElementById('visitor-msg').innerText = t.visitorTitle;
            document.getElementById('copyright-text').innerText = t.copyright;

            const langSlider = document.getElementById('langSlider');
            const langAr = document.getElementById('lang-ar');
            const langEn = document.getElementById('lang-en');
            
            if (currentLang === 'ar') {
                langSlider.style.transform = 'translateX(0)';
                langAr.classList.add('active');
                langEn.classList.remove('active');
            } else {
                langSlider.style.transform = 'translateX(28px)';
                langEn.classList.add('active');
                langAr.classList.remove('active');
            }
        }

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn');

        settingsBtn.onclick = () => { 
            settingsBtn.classList.add('rotate');
            settingsPanel.classList.add('active'); 
            overlay.classList.add('active'); 
            setTimeout(() => { 
                animateCounter('web-counter', 100, 1500); 
                animateCounter('visit-counter', totalVisits, 2000);
            }, 500);
        };

        const closePanelFunc = () => {
            settingsBtn.classList.remove('rotate');
            settingsPanel.classList.remove('active'); 
            overlay.classList.remove('active'); 
        };

        closeBtn.onclick = closePanelFunc;
        overlay.onclick = closePanelFunc;

        function animateCounter(id, target, duration) {
            const el = document.getElementById(id);
            let start = 0;
            const step = target / (duration / 16);
            const timer = setInterval(() => {
                start += step;
                if (start >= target) {
                    el.innerText = Math.floor(target).toLocaleString();
                    clearInterval(timer);
                } else {
                    el.innerText = Math.floor(start).toLocaleString();
                }
            }, 16);
        }

        document.getElementById('modeToggle').onclick = () => {
            document.body.classList.toggle('light-mode');
            updateLanguage();
        };

        document.getElementById('langToggle').onclick = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            updateLanguage();
        };

        document.getElementById('accToggle').onclick = () => document.getElementById('accBox').classList.toggle('open');

        let currentSize = 16;
        function changeFontSize(step) {
            currentSize += step;
            if (currentSize >= 12 && currentSize <= 24) {
                document.documentElement.style.setProperty('--base-font-size', currentSize + 'px');
            } else {
                currentSize -= step; 
            }
        }

        document.getElementById('contrastBtn').onclick = function() {
            this.classList.toggle('active');
            document.body.classList.toggle('high-contrast-text');
        };
        
        document.getElementById('glassCounter').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('infoPopup').classList.toggle('active');
        };
    </script>
</body>
</html>
