<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Ghoneim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&family=El+Messiri:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a0000 0%, #3d0303 50%, #1a0000 100%);
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.07);
            --panel-bg: rgba(40, 5, 5, 0.85);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #edeae0 0%, #e0dcd0 100%);
            --text-color: #2a0202; 
            --btn-bg: rgba(0, 0, 0, 0.05);
            --panel-bg: rgba(237, 234, 224, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.12);
            --border-color: rgba(0, 0, 0, 0.06);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            transition: background 0.7s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.5s ease, 
                        border-color 0.5s ease, 
                        box-shadow 0.5s ease,
                        transform 0.6s ease;
        }
        
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
            background: var(--bg-gradient);
        }

        .welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: transparent;
            pointer-events: none;
        }
        
        .welcome-text {
            font-family: 'El Messiri', sans-serif;
            font-size: 3.2rem;
            font-weight: 700; 
            color: #ffffff;
            opacity: 0; 
            transform: scale(0.9);
            filter: blur(10px);
            animation: welcomeAnim 2.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @keyframes welcomeAnim {
            0% { opacity: 0; transform: scale(0.8); filter: blur(15px); }
            30% { opacity: 1; transform: scale(1); filter: blur(0); }
            75% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(10px); visibility: hidden; }
        }

        .container {
            display: flex; flex-direction: column; 
            justify-content: flex-start; align-items: center; 
            height: 100vh; padding: 20px; text-align: center;
            padding-top: 5vh;
        }

        .settings-icon {
            position: fixed; top: 20px; left: 20px;
            font-size: 1.2rem; color: var(--text-color);
            cursor: pointer; z-index: 100; opacity: 0;
            animation: fadeInAll 0.5s ease-in 2.4s forwards;
        }
        .settings-icon.rotate { transform: rotate(180deg); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);
            z-index: 999; opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .settings-panel {
            position: fixed; top: 20px; left: 20px;
            width: 270px; background: var(--panel-bg); backdrop-filter: blur(25px);
            z-index: 1000; box-shadow: 0 10px 40px var(--shadow-color);
            padding: 35px 20px 25px 20px; border-radius: 25px;
            border: 1px solid var(--border-color); direction: rtl;
            transform-origin: top left; 
            transform: scale(0); 
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .settings-panel.active { 
            transform: scale(1); 
            opacity: 1;
            visibility: visible;
        }

        .profile-pic {
            width: 90px; height: 90px; border-radius: 50%;
            background-image: url('Https://i.supaimg.com/d73ac461-53ca-466f-bc1e-61f2abd83dfe/01659496-a3b9-4e9f-9a68-1da631d42a99.jpg');
            background-size: cover; background-position: center;
            border: 3px solid var(--border-color);
            box-shadow: 0 10px 25px var(--shadow-color); margin-bottom: 12px;
            opacity: 0;
            /* الصورة الآن تظهر بحركة slideDown فقط وتظل ثابتة بعدها */
            animation: slideDownPic 1s ease-out 2.5s forwards;
        }
        @keyframes slideDownPic { to { opacity: 1; transform: translateY(0); } }

        .header-name-wrapper {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; opacity: 0; transform: translateY(15px);
            animation: wrapperSlideUp 1s ease-out 2.7s forwards, floatName 3s ease-in-out infinite 3.7s;
        }
        @keyframes wrapperSlideUp { to { opacity: 1; transform: translateY(0); } }
        /* حركة الاسم لأعلى وأسفل */
        @keyframes floatName {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .header-name { 
            font-family: 'Dancing Script', cursive; 
            font-size: 1.9rem; 
            color: #B8860B; 
        }
        
        .verify-badge { color: #1DA1F2; font-size: 1.1rem; margin-left: 10px; }

        .main-content {
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; animation: fadeInAll 0.5s ease-in 2.4s forwards;
            margin-bottom: 60px;
        }
        @keyframes fadeInAll { to { opacity: 1; } }

        .links-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .btn {
            background: var(--btn-bg); backdrop-filter: blur(10px); 
            color: var(--text-color); padding: 14px; border-radius: 18px;
            text-decoration: none; font-weight: 700; font-size: 0.88rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid var(--border-color);
            opacity: 0; width: 100%;
        }

        .main-content .btn:nth-child(1) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.8s forwards; }
        .main-content .btn:nth-child(2) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.95s forwards; }
        .main-content .btn:nth-child(3) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.1s forwards; }
        .main-content .btn:nth-child(4) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.25s forwards; }
        .main-content .btn:nth-child(5) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.4s forwards; }

        @keyframes popGlass { 0% { opacity: 0; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        .settings-counter-wrapper {
            margin-top: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-counter-box {
            font-family: 'Cairo', sans-serif; 
            font-size: 9px;
            color: var(--text-color); 
            font-weight: 700; 
            background: var(--btn-bg);
            backdrop-filter: blur(10px);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            z-index: 2;
        }

        .info-popup {
            position: absolute;
            top: calc(100% + 8px); 
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: max-content;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 5px 15px var(--shadow-color);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1001;
        }
        .info-popup.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .info-icon { color: #FFD700; font-size: 0.8rem; }
        .info-text { font-size: 0.65rem; font-weight: 600; color: var(--text-color); }

        .copyright-bottom { 
            position: fixed; 
            bottom: 8px; 
            left: 50%;
            transform: translateX(-50%); 
            font-family: 'Cairo', sans-serif; 
            font-size: 7.5px; 
            color: #8e8e8e; 
            opacity: 0; 
            white-space: nowrap;
            animation: fadeInAll 0.8s ease-in 3.6s forwards; 
            letter-spacing: 0.5px;
        }

        .fa-tiktok { color: #ffffff; text-shadow: -1.5px -1.5px 0 #25F4EE, 1.5px 1.5px 0 #FE2C55; }
        body.light-mode .fa-tiktok { color: #000000; }
        .mini-verify { color: #1DA1F2; font-size: 0.7rem; margin-right: 3px; }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <div class="welcome-text">مرحباً</div>
    </div>

    <i class="fas fa-cog settings-icon" id="settingsBtn"></i>
    <div class="overlay" id="overlay"></div>

    <div class="settings-panel" id="settingsPanel">
        <i class="fas fa-times close-panel" id="closeBtn" style="position: absolute; top: 15px; left: 15px; cursor: pointer; opacity: 0.5;"></i>
        
        <div id="modeToggle" style="display: flex; align-items: center; justify-content: space-between; background: var(--btn-bg); padding: 12px 15px; border-radius: 15px; cursor: pointer; border: 1px solid var(--border-color); margin-top: 10px;">
            <span id="modeText" style="font-size: 0.85rem; font-weight: 600;">الوضع الفاتح</span>
            <i class="fas fa-sun" id="modeIcon" style="color: #FFD700;"></i>
        </div>

        <div style="margin-top: 15px; font-size: 0.75rem; background: var(--btn-bg); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 5px; justify-content: center;">
            <span>مشارك في +<span id="web-counter">0</span> Web</span>
            <i class="fas fa-check-circle mini-verify"></i>
        </div>

        <div class="settings-counter-wrapper">
            <div class="glass-counter-box" id="glassCounter">
                <i class="fas fa-users" style="font-size: 0.7rem; opacity: 0.7;"></i>
                <span id="visit-counter">0</span>
            </div>
            
            <div class="info-popup" id="infoPopup">
                <i class="fas fa-exclamation-circle info-icon"></i>
                <span class="info-text">عدد زوار الموقع</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="profile-pic"></div>
        <div class="header-name-wrapper">
            <div class="header-name">Ahmed Ghoneim</div>
            <i class="fas fa-check-circle verify-badge"></i>
        </div>
        <div class="main-content">
            <div class="links-container">
                <a href="https://www.facebook.com/share/18k8Qf8y4P/" target="_blank" class="btn"><i class="fab fa-facebook" style="color: #1877F2;"></i> Facebook</a>
                <a href="https://www.instagram.com/ahmed.8oneim?igsh=cHZnMTRpMTV2aTJk" target="_blank" class="btn"><i class="fab fa-instagram" style="color: #E4405F;"></i> Instagram</a>
                <a href="https://www.tiktok.com/@a7med.8oneim?_r=1&_t=ZS-956Zeogmk80" target="_blank" class="btn"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="https://t.me/ahmed_8oneim" target="_blank" class="btn"><i class="fab fa-telegram" style="color: #24A1DE;"></i> Telegram</a>
                <a href="mailto:qwrtreu1245@gmail.com" class="btn"><i class="fas fa-envelope" style="color: #EA4335;"></i> Gmail</a>
            </div>
            <div class="wish" style="font-family: 'Dancing Script', cursive; font-size: 0.95rem; color: #B8860B; margin-top: 25px; display: flex; align-items: center; gap: 8px; opacity: 0.9;">
                Have a nice day <i class="fas fa-sparkles" style="font-size: 0.8rem;"></i>
            </div>
        </div>
    </div>

    <div class="copyright-bottom">جميع الحقوق محفوظة للمطور أحمد</div>

    <script>
        function animateCounter(id, targetValue, duration) {
            const countElement = document.getElementById(id);
            if(!countElement) return;
            let startTime = null;
            function updateCount(currentTime) {
                if (!startTime) startTime = currentTime;
                const progress = Math.min((currentTime - startTime) / duration, 1);
                const currentNum = Math.floor(progress * targetValue);
                if (progress < 1) {
                    countElement.innerText = currentNum.toLocaleString();
                    requestAnimationFrame(updateCount);
                } else {
                    countElement.innerText = (id === 'visit-counter') ? "+20 ألف" : currentNum.toLocaleString();
                }
            }
            requestAnimationFrame(updateCount);
        }

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn');
        const glassCounter = document.getElementById('glassCounter');
        const infoPopup = document.getElementById('infoPopup');

        settingsBtn.onclick = () => { 
            settingsBtn.classList.add('rotate');
            settingsPanel.classList.add('active'); 
            overlay.classList.add('active'); 
            
            document.getElementById('web-counter').innerText = '0';
            document.getElementById('visit-counter').innerText = '0';
            setTimeout(() => { 
                animateCounter('web-counter', 100, 1000); 
                animateCounter('visit-counter', 20000, 1000);
            }, 500);
        };

        const closePanelFunc = () => {
            settingsBtn.classList.remove('rotate');
            settingsPanel.classList.remove('active'); 
            overlay.classList.remove('active'); 
            infoPopup.classList.remove('active');
        };

        closeBtn.onclick = closePanelFunc;
        overlay.onclick = closePanelFunc;

        glassCounter.onclick = (e) => {
            e.stopPropagation();
            infoPopup.classList.toggle('active');
        };

        const modeToggle = document.getElementById('modeToggle');
        const modeText = document.getElementById('modeText');
        const modeIcon = document.getElementById('modeIcon');
        modeToggle.onclick = () => {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                modeText.innerText = "الوضع الداكن";
                modeIcon.classList.replace('fa-sun', 'fa-moon');
                modeIcon.style.color = "#2a0202";
            } else {
                modeText.innerText = "الوضع الفاتح";
                modeIcon.classList.replace('fa-moon', 'fa-sun');
                modeIcon.style.color = "#FFD700";
            }
        };
    </script>
</body>
</html>
