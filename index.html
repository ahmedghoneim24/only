<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Ghoneim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&family=El+Messiri:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a0000 0%, #3d0303 50%, #1a0000 100%);
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.07);
            --panel-bg: rgba(40, 5, 5, 0.85);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #edeae0 0%, #e0dcd0 100%);
            --text-color: #2a0202; 
            --btn-bg: rgba(0, 0, 0, 0.05);
            --panel-bg: rgba(237, 234, 224, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.12);
            --border-color: rgba(0, 0, 0, 0.06);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            transition: background 0.7s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.5s ease, 
                        border-color 0.5s ease, 
                        box-shadow 0.5s ease,
                        transform 0.6s ease;
        }
        
        html { font-size: var(--base-font-size, 16px); }

        body, html {
            height: 100%; width: 100%; overflow: hidden;
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
            background: var(--bg-gradient);
            /* --- التحديثات: منع النسخ وزيادة السلاسة --- */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: transparent;
            pointer-events: none;
        }
        
        .welcome-text {
            font-family: 'El Messiri', sans-serif;
            font-size: 3.2rem;
            font-weight: 700; 
            color: #ffffff;
            opacity: 0; 
            transform: scale(0.9);
            filter: blur(10px);
            animation: welcomeAnim 2.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @keyframes welcomeAnim {
            0% { opacity: 0; transform: scale(0.8); filter: blur(15px); }
            30% { opacity: 1; transform: scale(1); filter: blur(0); }
            75% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(10px); visibility: hidden; }
        }

        .container {
            display: flex; flex-direction: column; 
            justify-content: flex-start; align-items: center; 
            height: 100vh; padding: 20px; text-align: center;
            padding-top: 5vh;
        }

        .settings-icon {
            position: fixed; top: 20px; left: 20px;
            font-size: 1.2rem; color: var(--text-color);
            cursor: pointer; z-index: 100; opacity: 0;
            animation: fadeInAll 0.5s ease-in 2.4s forwards;
        }
        .settings-icon.rotate { transform: rotate(180deg); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);
            z-index: 999; opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .settings-panel {
            position: fixed; top: 20px; left: 20px;
            width: 270px; background: var(--panel-bg); backdrop-filter: blur(25px);
            z-index: 1000; box-shadow: 0 10px 40px var(--shadow-color);
            padding: 35px 20px 25px 20px; border-radius: 25px;
            border: 1px solid var(--border-color); direction: rtl;
            transform-origin: top left; 
            transform: scale(0); 
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .settings-panel.active { 
            transform: scale(1); 
            opacity: 1;
            visibility: visible;
        }
        html[dir="ltr"] .settings-panel { direction: ltr; transform-origin: top left; left: 20px; }

        .profile-pic {
            width: 90px; height: 90px; border-radius: 50%;
            background-image: url('Https://i.supaimg.com/d73ac461-53ca-466f-bc1e-61f2abd83dfe/01659496-a3b9-4e9f-9a68-1da631d42a99.jpg');
            background-size: cover; background-position: center;
            border: 3px solid var(--border-color);
            box-shadow: 0 10px 25px var(--shadow-color); margin-bottom: 12px;
            opacity: 0;
            animation: slideDownPic 1s ease-out 2.5s forwards;
        }
        @keyframes slideDownPic { to { opacity: 1; transform: translateY(0); } }

        .header-name-wrapper {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; opacity: 0; transform: translateY(15px);
            animation: wrapperSlideUp 1s ease-out 2.7s forwards, floatName 3s ease-in-out infinite 3.7s;
            direction: ltr;
            gap: 6px;
        }
        @keyframes wrapperSlideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes floatName {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .header-name { 
            font-family: 'Dancing Script', cursive; 
            font-size: 1.9rem; 
            color: #B8860B; 
        }
        
        .verify-badge { color: #1DA1F2; font-size: 1.1rem; }
        html[dir="ltr"] .verify-badge { margin: 0; }

        .main-content {
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; animation: fadeInAll 0.5s ease-in 2.4s forwards;
            margin-bottom: 60px;
        }
        @keyframes fadeInAll { to { opacity: 1; } }

        .links-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .btn {
            background: var(--btn-bg); backdrop-filter: blur(10px); 
            color: var(--text-color); padding: 14px; border-radius: 18px;
            text-decoration: none; font-weight: 700; font-size: 0.88rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid var(--border-color);
            opacity: 0; width: 100%;
            /* --- التحديث: السلاسة وبروز الأزرار الأساسي --- */
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        /* --- التحديث: تأثير حركة السلاسة عند لمس الأزرار --- */
        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        /* --- التحديث: ظل الأيقونات لإعطاء إحساس البروز الكامل --- */
        .btn i {
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.6));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.4s ease;
        }

        .btn:hover i {
            transform: scale(1.15);
            filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.8));
        }

        body.light-mode .btn i {
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.25));
        }
        
        body.light-mode .btn:hover i {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.35));
        }

        .main-content .btn:nth-child(1) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.8s forwards; }
        .main-content .btn:nth-child(2) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.95s forwards; }
        .main-content .btn:nth-child(3) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.1s forwards; }
        .main-content .btn:nth-child(4) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.25s forwards; }
        .main-content .btn:nth-child(5) { animation: popGlass 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.4s forwards; }

        @keyframes popGlass { 0% { opacity: 0; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        .settings-counter-wrapper {
            margin-top: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-counter-box {
            font-family: 'Cairo', sans-serif; 
            font-size: 9px;
            color: var(--text-color); 
            font-weight: 700; 
            background: var(--btn-bg);
            backdrop-filter: blur(10px);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            z-index: 2;
        }

        .info-popup {
            position: absolute;
            top: calc(100% + 8px); 
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: max-content;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 5px 15px var(--shadow-color);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1001;
        }
        .info-popup.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .info-icon { color: #FFD700; font-size: 0.8rem; }
        .info-text { font-size: 0.65rem; font-weight: 600; color: var(--text-color); }

        .copyright-bottom { 
            position: fixed; 
            bottom: 8px; 
            left: 50%;
            transform: translateX(-50%); 
            font-family: 'Cairo', sans-serif; 
            font-size: 7.5px; 
            color: #8e8e8e; 
            opacity: 0; 
            white-space: nowrap;
            animation: fadeInAll 0.8s ease-in 3.6s forwards; 
            letter-spacing: 0.5px;
        }

        .fa-tiktok { color: #ffffff; text-shadow: -1.5px -1.5px 0 #25F4EE, 1.5px 1.5px 0 #FE2C55; }
        body.light-mode .fa-tiktok { color: #000000; }
        .mini-verify { color: #1DA1F2; font-size: 0.7rem; margin-right: 3px; }

        .acc-toggle {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--btn-bg); padding: 12px 15px; border-radius: 15px;
            cursor: pointer; border: 1px solid var(--border-color); margin-top: 15px;
        }
        .acc-box {
            background: rgba(255, 255, 255, 0.05); border-radius: 15px;
            border: 1px dashed var(--border-color); max-height: 0; overflow: hidden;
            transition: all 0.4s ease; margin-top: 5px; opacity: 0;
        }
        .acc-box.open { padding: 12px; max-height: 200px; opacity: 1; }
        .acc-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .acc-row:last-child { margin-bottom: 0; }
        .acc-btn {
            background: var(--btn-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 5px 12px; border-radius: 10px;
            cursor: pointer; font-size: 0.75rem; transition: transform 0.2s, background 0.3s;
        }
        .acc-btn:active { transform: scale(0.95); }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: background 0.4s ease, border-color 0.4s ease;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
        }
        body.light-mode .toggle-switch {
            background: rgba(0, 0, 0, 0.15);
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.1);
        }
        .toggle-knob {
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            right: 3px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        html[dir="ltr"] .toggle-knob {
            right: auto;
            left: 3px;
        }
        body.high-contrast-text .toggle-switch {
            background: #34C759; 
            border-color: #34C759;
        }
        body.high-contrast-text .toggle-knob {
            transform: translateX(-20px);
        }
        html[dir="ltr"] body.high-contrast-text .toggle-knob {
            transform: translateX(20px);
        }

        body.high-contrast-text {
            --btn-bg: rgba(0, 0, 0, 0.85);
            --panel-bg: rgba(0, 0, 0, 0.95);
            --border-color: rgba(255, 255, 255, 0.3);
        }
        body.light-mode.high-contrast-text {
            --btn-bg: rgba(255, 255, 255, 0.95);
            --panel-bg: rgba(255, 255, 255, 1);
            --border-color: rgba(0, 0, 0, 0.4);
        }
        body.high-contrast-text * { font-weight: 800 !important; }
        body.high-contrast-text .header-name, 
        body.high-contrast-text .wish { color: #ffffff !important; }
        body.light-mode.high-contrast-text .header-name, 
        body.light-mode.high-contrast-text .wish { color: #000000 !important; }

        .lang-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, rgba(77, 184, 255, 0.15), rgba(77, 184, 255, 0.05));
            padding: 10px 15px;
            border-radius: 15px;
            cursor: pointer;
            border: 1px solid rgba(77, 184, 255, 0.3);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .lang-toggle-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(77, 184, 255, 0.25), rgba(77, 184, 255, 0.1));
            box-shadow: 0 6px 20px rgba(77, 184, 255, 0.25);
            border-color: rgba(77, 184, 255, 0.5);
        }

        .lang-toggle-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.6s;
        }

        .lang-toggle-btn:hover::before {
            left: 100%;
        }

        .lang-text-styled {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4db8ff;
            letter-spacing: 0.5px;
            z-index: 1;
            transition: color 0.4s;
        }

        .lang-icon-wrapper {
            background: #4db8ff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(77, 184, 255, 0.4);
            z-index: 1;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s;
        }

        .lang-toggle-btn:hover .lang-icon-wrapper {
            transform: rotate(360deg) scale(1.1);
        }

        .lang-icon-wrapper i {
            color: #fff;
            font-size: 0.85rem;
        }
        
        body.light-mode .lang-toggle-btn {
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.1), rgba(0, 102, 204, 0.05));
            border-color: rgba(0, 102, 204, 0.3);
        }
        body.light-mode .lang-toggle-btn:hover {
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.2), rgba(0, 102, 204, 0.08));
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.2);
        }
        body.light-mode .lang-text-styled {
            color: #0066cc;
        }
        body.light-mode .lang-icon-wrapper {
            background: #0066cc;
            box-shadow: 0 2px 8px rgba(0, 102, 204, 0.4);
        }
        body.high-contrast-text .lang-text-styled {
            color: #ffffff !important;
        }
        body.light-mode.high-contrast-text .lang-text-styled {
            color: #000000 !important;
        }
    </style>
</head>

    <script>
        const translations = {
            ar: {
                welcome: "مرحباً",
                modeLight: "الوضع الفاتح",
                modeDark: "الوضع الداكن",
                webContrib: "مشارك في +",
                accTitle: "الوصول",
                fontSize: "حجم الخط",
                contrast: "تباين عالي",
                contrastOn: "تفعيل",
                contrastOff: "إلغاء",
                visitorTitle: "عدد زوار الموقع",
                copyright: "جميع الحقوق محفوظة للمطور أحمد غنيم",
                wish: "Have a nice day",
                visitCount: "+20 ألف"
            },
            en: {
                welcome: "Welcome",
                modeLight: "Light Mode",
                modeDark: "Dark Mode",
                webContrib: "Participant in +",
                accTitle: "Accessibility",
                fontSize: "Font Size",
                contrast: "High Contrast",
                contrastOn: "Enable",
                contrastOff: "Disable",
                visitorTitle: "Visitor Count",
                copyright: "All Rights Reserved to Developer Ahmed Ghoneim",
                wish: "Have a nice day",
                visitCount: "+20K"
            }
        };

        let currentLang = 'ar';

        function updateLanguage() {
            const t = translations[currentLang];
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            
            document.getElementById('welcome-msg').innerText = t.welcome;
            document.getElementById('modeText').innerText = document.body.classList.contains('light-mode') ? t.modeDark : t.modeLight;
            document.getElementById('langText').innerText = currentLang === 'ar' ? "English" : "العربية";
            document.getElementById('web-contrib').innerHTML = `${t.webContrib}<span id="web-counter">100</span> Web`;
            document.getElementById('acc-title').innerText = t.accTitle;
            document.getElementById('font-size-label').innerText = t.fontSize;
            document.getElementById('contrast-label').innerText = t.contrast;
            
            document.getElementById('contrastBtn').title = document.body.classList.contains('high-contrast-text') ? t.contrastOff : t.contrastOn;
            
            document.getElementById('visitor-msg').innerText = t.visitorTitle;
            document.getElementById('copyright-text').innerText = t.copyright;
            if(document.getElementById('visit-counter').innerText !== '0') {
                 document.getElementById('visit-counter').innerText = t.visitCount;
            }
        }

        function animateCounter(id, targetValue, duration) {
            const countElement = document.getElementById(id);
            if(!countElement) return;
            let startTime = null;
            function updateCount(currentTime) {
                if (!startTime) startTime = currentTime;
                const progress = Math.min((currentTime - startTime) / duration, 1);
                const currentNum = Math.floor(progress * targetValue);
                if (progress < 1) {
                    countElement.innerText = currentNum.toLocaleString();
                    requestAnimationFrame(updateCount);
                } else {
                    countElement.innerText = (id === 'visit-counter') ? translations[currentLang].visitCount : currentNum.toLocaleString();
                }
            }
            requestAnimationFrame(updateCount);
        }

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn');
        const glassCounter = document.getElementById('glassCounter');
        const infoPopup = document.getElementById('infoPopup');

        settingsBtn.onclick = () => { 
            settingsBtn.classList.add('rotate');
            settingsPanel.classList.add('active'); 
            overlay.classList.add('active'); 
            
            document.getElementById('web-counter').innerText = '0';
            document.getElementById('visit-counter').innerText = '0';
            setTimeout(() => { 
                animateCounter('web-counter', 100, 1500); 
                animateCounter('visit-counter', 20000, 2000);
            }, 500);
        };

        const closePanelFunc = () => {
            settingsBtn.classList.remove('rotate');
            settingsPanel.classList.remove('active'); 
            overlay.classList.remove('active'); 
            infoPopup.classList.remove('active');
            document.getElementById('accBox').classList.remove('open');
        };

        closeBtn.onclick = closePanelFunc;
        overlay.onclick = closePanelFunc;

        glassCounter.onclick = (e) => {
            e.stopPropagation();
            infoPopup.classList.toggle('active');
        };

        const modeToggle = document.getElementById('modeToggle');
        const modeText = document.getElementById('modeText');
        const modeIcon = document.getElementById('modeIcon');
        modeToggle.onclick = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            modeText.innerText = isLight ? translations[currentLang].modeDark : translations[currentLang].modeLight;
            if (isLight) {
                modeIcon.classList.replace('fa-sun', 'fa-moon');
                modeIcon.style.color = "#2a0202";
            } else {
                modeIcon.classList.replace('fa-moon', 'fa-sun');
                modeIcon.style.color = "#FFD700";
            }
        };

        const langToggle = document.getElementById('langToggle');
        langToggle.onclick = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            updateLanguage();
        };

        const accToggle = document.getElementById('accToggle');
        const accBox = document.getElementById('accBox');
        accToggle.onclick = () => accBox.classList.toggle('open');

        let currentSize = 16;
        function changeFontSize(step) {
            currentSize += step;
            if (currentSize >= 12 && currentSize <= 24) {
                document.documentElement.style.setProperty('--base-font-size', currentSize + 'px');
            } else {
                currentSize -= step; 
            }
        }

        const contrastBtn = document.getElementById('contrastBtn');
        contrastBtn.onclick = () => {
            document.body.classList.toggle('high-contrast-text');
            const isOn = document.body.classList.contains('high-contrast-text');
            contrastBtn.title = isOn ? translations[currentLang].contrastOff : translations[currentLang].contrastOn;
        };
    </script>
</body>
</html>
